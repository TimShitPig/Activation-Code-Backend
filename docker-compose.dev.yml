services:
  后端服务:
    build:
      context: ./后端服务
      dockerfile: Dockerfile
    container_name: 激活码后端服务
    working_dir: /app
    volumes:
      - ./后端服务:/app
      - ./数据:/app/data
      - 后端_node_modules:/app/node_modules
    ports:
      - "7789:7789"
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      SYSTEM_CONFIG_PATH: "/app/data/系统配置.json"
      PORT: "7789"

  管理后台:
    build:
      context: ./管理后台
      dockerfile: Dockerfile
    container_name: 激活码管理后台
    working_dir: /app
    volumes:
      - ./管理后台:/app
      - 后台_node_modules:/app/node_modules
    ports:
      - "7788:7788"
    command: sh -c "npm install && npm run dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_BASE: "http://localhost:7789/api"
    depends_on:
      - 后端服务

volumes:
  后端_node_modules:
  后台_node_modules:
